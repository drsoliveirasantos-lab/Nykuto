name: Website CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, preview]

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run repository hygiene
        run: npm run hygiene
      - name: Run TypeScript typecheck
        run: npm run typecheck
      - name: Build website
        run: npm run build
